<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Data -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simple Bank System UI using HTML and CSS">
    <meta name="keywords" content="Bank, HTML, CSS, Account, UI">
    <meta name="author" content="Your Name">

    <title>Bank System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>BANK MANAGEMENT SYSTEM</h1>

    <div class="container">

        <!-- Account Info -->
        <div class="box">
            <h2>Account Details</h2>
            <p>Name: Ahmed</p>
            <p>Account No: 12345</p>
            <p>Balance: $500</p>
        </div>

        <!-- Deposit -->
        <div class="box">
            <h2>Deposit</h2>
            <input type="number" placeholder="Enter amount">
            <button>Deposit</button>
        </div>

        <!-- Withdraw -->
        <div class="box">
            <h2>Withdraw</h2>
            <input type="number" placeholder="Enter amount">
            <button>Withdraw</button>
        </div>

    </div>

</body>
</html>
