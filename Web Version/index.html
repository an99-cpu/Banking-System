<!DOCTYPE html>
<html>
<head>
    <title>Bank System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Simple Bank System</h1>

<div class="box">
    <h2>Create Account</h2>
    <input id="name" placeholder="Name"><br>
    <input id="accNo" placeholder="Account Number"><br>
    <input id="pin" placeholder="PIN"><br>
    <input id="balance" placeholder="Initial Balance"><br>
    <button onclick="createAccount()">Create</button>
</div>

<div class="box">
    <h2>Login</h2>
    <input id="loginPin" placeholder="Enter PIN"><br>
    <button onclick="login()">Login</button>
</div>

<div class="box" id="bankSection" style="display:none;">
    <h2>Bank Menu</h2>
    <input id="amount" placeholder="Amount"><br>
    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>
    <button onclick="showBalance()">Check Balance</button>
</div>

<h2 id="output"></h2>

<script src="script.js"></script>

</body>
</html>
